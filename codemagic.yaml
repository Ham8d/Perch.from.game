workflows:
  build-dylib:
    name: Build FreeIAP dylib
    max_build_duration: 30
    environment:
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          set -e
          brew install ldid make
          echo 'export PATH="/opt/homebrew/opt/make/libexec/gnubin:$PATH"' >> $CM_ENV

      - name: Setup Theos
        script: |
          set -e
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip -q master.zip
          mv sdks-master/*.sdk $THEOS/sdks/
          echo "THEOS=$THEOS" >> $CM_ENV
          echo "export THEOS=$THEOS" >> $CM_ENV

      - name: Build dylib
        script: |
          set -e
          export THEOS=$HOME/theos
          export PATH="/opt/homebrew/opt/make/libexec/gnubin:$THEOS/bin:$PATH"
          
          if [ -f "Tweak.xm" ] && [ ! -f "Tweak.m" ]; then
            echo "⚠️  Found Tweak.xm, renaming to Tweak.m"
            mv Tweak.xm Tweak.m
          fi
          
          if [ -f "Tweak.x" ] && [ ! -f "Tweak.m" ]; then
            echo "⚠️  Found Tweak.x, renaming to Tweak.m"
            mv Tweak.x Tweak.m
          fi
          
          echo "✅ Files ready:"
          ls -la Tweak.m Makefile
          
          make clean
          make

      - name: Collect artifacts
        script: |
          set -e
          mkdir -p output
          
          echo "=========================================="
          echo "🔍 All .dylib files found in .theos:"
          echo "=========================================="
          find .theos -name "*.dylib" -type f | while read f; do
            echo "📄 $f"
            file "$f"
            echo "---"
          done
          echo "=========================================="
          
          # نبحث عن الـ dylib الصحيح (Mach-O binary)
          FOUND_DYLIB=""
          while IFS= read -r dylib; do
            if file "$dylib" | grep -q "Mach-O"; then
              echo "✅ Valid Mach-O dylib found: $dylib"
              FOUND_DYLIB="$dylib"
              break
            else
              echo "⏭️  Skipping (not Mach-O): $dylib"
            fi
          done < <(find .theos -name "FreeIAP.dylib" -type f)
          
          if [ -z "$FOUND_DYLIB" ]; then
            echo "❌ No valid Mach-O FreeIAP.dylib found!"
            echo "Searching for any Mach-O dylib in .theos:"
            find .theos -name "*.dylib" -type f -exec file {} \;
            exit 1
          fi
          
          cp "$FOUND_DYLIB" output/FreeIAP.dylib
          
          echo "=========================================="
          echo "📋 File info before signing:"
          file output/FreeIAP.dylib
          echo "=========================================="
          
          # فحص إنها Mach-O قبل ldid
          if ! file output/FreeIAP.dylib | grep -q "Mach-O"; then
            echo "❌ Output file is not a Mach-O binary!"
            exit 1
          fi
          
          ldid -S output/FreeIAP.dylib
          
          echo "✅ Build successful:"
          ls -la output/
          file output/FreeIAP.dylib

    artifacts:
      - output/FreeIAP.dylib
