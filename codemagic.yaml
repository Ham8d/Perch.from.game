workflows:
  build-dylib:
    name: Build FreeIAP dylib
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      vars:
        THEOS: /Users/builder/theos
    scripts:
      - name: Install Theos
        script: |
          set -e
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -LO https://github.com/sbingner/llvm-project/releases/download/v10.0.0-1/linux-ios-arm64e-clang-toolchain.tar.lzma || true

      - name: Install iOS SDK
        script: |
          cd $THEOS/sdks
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xzf -
          mv sdks-master/*.sdk .
          rm -rf sdks-master

      - name: Build tweak
        script: |
          export THEOS=$THEOS
          make clean
          make
          make package FINALPACKAGE=1

      - name: Extract dylib
        script: |
          mkdir -p output
          cp .theos/obj/debug/FreeIAP.dylib output/ 2>/dev/null || \
          cp .theos/obj/FreeIAP.dylib output/
          cp packages/*.deb output/ 2>/dev/null || true

    artifacts:
      - output/*.dylib
      - output/*.deb
